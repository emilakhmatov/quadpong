<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Quad Pong — Мультиплеер</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a14;color:#fff;font-family:system-ui,-apple-system,sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}

.screen{display:none;flex-direction:column;align-items:center;gap:1.25rem;
  width:100%;max-width:400px;padding:2rem 1.25rem}
.screen.on{display:flex}

h1{font-size:2.4rem;font-weight:700;letter-spacing:-1px;
  background:linear-gradient(135deg,#7F77DD,#5DCAA5);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}

.card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  border-radius:16px;padding:1.25rem;width:100%}
.card-label{font-size:.8rem;opacity:.5;margin-bottom:.75rem}

.modes{display:flex;gap:.75rem}
.mode{flex:1;padding:1.1rem .5rem;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.1);border-radius:12px;cursor:pointer;
  text-align:center;transition:all .15s;color:#fff;font-size:.9rem}
.mode:hover,.mode.sel{border-color:#7F77DD;background:rgba(127,119,221,.15)}
.mode-icon{font-size:1.6rem;margin-bottom:.3rem}
.mode-sub{font-size:.75rem;opacity:.5;margin-top:.2rem}

input{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);
  border-radius:10px;color:#fff;font-size:1.6rem;padding:.5rem .75rem;
  width:100%;text-align:center;letter-spacing:.25em;text-transform:uppercase;outline:none}
input:focus{border-color:#7F77DD}
input::placeholder{opacity:.25;letter-spacing:.1em}

.btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);
  color:#fff;padding:.7rem 1.5rem;border-radius:10px;font-size:.95rem;
  cursor:pointer;width:100%;transition:all .15s}
.btn:hover{background:rgba(255,255,255,.12)}
.btn.pri{background:#7F77DD;border-color:#7F77DD}
.btn.pri:hover{background:#534AB7}

.or{display:flex;align-items:center;gap:.75rem;width:100%;
  color:rgba(255,255,255,.25);font-size:.8rem}
.or::before,.or::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.1)}

.room-code{font-size:3.2rem;font-weight:700;letter-spacing:.35em;color:#7F77DD;text-align:center}
.hint{font-size:.8rem;opacity:.4;text-align:center;line-height:1.6}

.slots{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;width:100%}
.slot{padding:.55rem .75rem;border-radius:8px;border:1px solid rgba(255,255,255,.1);
  font-size:.85rem;text-align:center;opacity:.4;transition:all .2s}
.slot.filled{opacity:1}
.slot.me{font-weight:600}

.cd-num{font-size:7rem;font-weight:700;color:#7F77DD;text-align:center;line-height:1}

.err{color:#F09595;font-size:.82rem;text-align:center;min-height:1.1em}

#gw{width:100vw;height:100vh;display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:6px}
#gw.on{display:flex}
canvas{display:block;border-radius:12px;cursor:crosshair;touch-action:none}
#ctrl-hint{font-size:.72rem;opacity:.35;text-align:center}

.go-scores{display:flex;flex-direction:column;gap:.35rem;width:100%}
.go-row{display:flex;justify-content:space-between;padding:.4rem 0;
  border-bottom:1px solid rgba(255,255,255,.08);font-size:.9rem}
.winner-tag{font-size:1.1rem;font-weight:600;padding:.45rem 1.25rem;
  border-radius:8px;text-align:center}
</style>
</head>
<body>

<!-- ── LOBBY ─────────────────────────────────────── -->
<div class="screen on" id="s-lobby">
  <h1>Quad Pong</h1>
  <div class="card">
    <div class="card-label">Создать комнату</div>
    <div class="modes">
      <div class="mode sel" data-m="2" onclick="selMode(2,this)">
        <div class="mode-icon">⬛</div>
        <div>2 игрока</div>
        <div class="mode-sub">Лево / Право</div>
      </div>
      <div class="mode" data-m="4" onclick="selMode(4,this)">
        <div class="mode-icon">🔲</div>
        <div>4 игрока</div>
        <div class="mode-sub">Все 4 стороны</div>
      </div>
    </div>
    <button class="btn pri" style="margin-top:.9rem" onclick="createRoom()">Создать комнату</button>
  </div>
  <div class="or">или</div>
  <div class="card">
    <div class="card-label">Войти по коду</div>
    <input id="code-in" placeholder="XXXX" maxlength="4" oninput="this.value=this.value.toUpperCase()">
    <button class="btn" style="margin-top:.75rem" onclick="joinRoom()">Войти в комнату</button>
  </div>
  <div class="err" id="lobby-err"></div>
</div>

<!-- ── WAITING ────────────────────────────────────── -->
<div class="screen" id="s-wait">
  <h1>Quad Pong</h1>
  <p style="opacity:.45;font-size:.9rem">Код для приглашения игроков</p>
  <div class="room-code" id="show-code">----</div>
  <div class="card">
    <div class="card-label">Игроки онлайн</div>
    <div class="slots" id="slots"></div>
  </div>
  <div class="hint">Игра начнётся автоматически<br>когда все игроки подключатся</div>
  <div style="font-size:.75rem;opacity:.3;background:rgba(255,255,255,.04);
    padding:.45rem 1rem;border-radius:8px;width:100%;text-align:center"
    id="your-hint"></div>
</div>

<!-- ── COUNTDOWN ──────────────────────────────────── -->
<div class="screen" id="s-cd">
  <p style="opacity:.45">Приготовьтесь!</p>
  <div class="cd-num" id="cd-n">3</div>
</div>

<!-- ── GAME ───────────────────────────────────────── -->
<div id="gw">
  <canvas id="c"></canvas>
  <div id="ctrl-hint"></div>
</div>

<!-- ── GAME OVER ──────────────────────────────────── -->
<div class="screen" id="s-go">
  <h1>Конец игры</h1>
  <div class="winner-tag" id="winner-tag"></div>
  <div class="card" style="width:100%">
    <div class="card-label">Итоговые очки</div>
    <div class="go-scores" id="go-scores"></div>
  </div>
  <button class="btn pri" onclick="location.reload()">Играть снова</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ─── Constants (mirror server) ────────────────────────────────────
const GW=800,GH=800,WALL=14,PAD_W=14,PAD_LEN=90,BALL_R=10,STAR_R=13;
const BASE_SPD=300, SPD_PER_SCORE=8, MAX_EXTRA=220;

const COL  = {left:'#7F77DD',right:'#F0997B',top:'#5DCAA5',bottom:'#ED93B1'};
const NAME = {left:'Левый',right:'Правый',top:'Верхний',bottom:'Нижний'};
const CTRL = {left:'мышь ↕  или  W / S',right:'мышь ↕  или  ↑ / ↓',
              top:'мышь ↔  или  A / D',bottom:'мышь ↔  или  ← / →'};

// ─── State ───────────────────────────────────────────────────────
let socket, myMode=2, myRoomId, mySide, gs=null;
let canvas, ctx, scale;
let mouseX=GW/2, mouseY=GH/2;
let keys={};
let animId, sendTimer;
let trail=[];

// ─── UI helpers ──────────────────────────────────────────────────
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.getElementById('gw').classList.remove('on');
  const el=document.getElementById(id);
  if(el) el.classList.add('on');
}

function selMode(m,el){
  myMode=m;
  document.querySelectorAll('.mode').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');
}

// ─── Socket ──────────────────────────────────────────────────────
socket=io();

socket.on('joined',({roomId,side})=>{
  myRoomId=roomId; mySide=side;
  document.getElementById('show-code').textContent=roomId;
  document.getElementById('your-hint').textContent=
    `Вы — ${NAME[side]}  |  Управление: ${CTRL[side]}`;
  show('s-wait');
});

socket.on('lobby',({players,mode})=>{
  myMode=mode;
  const all=mode===2?['left','right']:['left','right','top','bottom'];
  document.getElementById('slots').innerHTML=all.map(s=>{
    const ok=players.includes(s);
    return `<div class="slot ${ok?'filled':''} ${s===mySide?'me':''}"
      style="border-color:${ok?COL[s]+'66':'rgba(255,255,255,.1)'};color:${ok?COL[s]:'rgba(255,255,255,.3)'}">
      ${NAME[s]} ${ok?(s===mySide?'(вы)':'✓'):'…'}
    </div>`;
  }).join('');
});

socket.on('countdown',()=>{
  show('s-cd');
  let n=3;
  document.getElementById('cd-n').textContent=n;
  const t=setInterval(()=>{
    n--;
    if(n<=0){clearInterval(t);initGame();}
    else document.getElementById('cd-n').textContent=n;
  },1000);
});

socket.on('state',s=>{gs=s;});

socket.on('gameover',({winner,scores})=>{
  cancelAnimationFrame(animId); clearInterval(sendTimer);
  const tag=document.getElementById('winner-tag');
  if(winner){tag.textContent=NAME[winner]+' победил!';
    tag.style.background=COL[winner]+'33';tag.style.color=COL[winner];}
  else{tag.textContent='Ничья!';tag.style.color='#fff';}
  const all=myMode===2?['left','right']:['left','right','top','bottom'];
  document.getElementById('go-scores').innerHTML=all.map(s=>
    `<div class="go-row"><span style="color:${COL[s]}">${NAME[s]}</span>
    <span>${scores[s]||0} очков</span></div>`).join('');
  show('s-go');
});

socket.on('playerLeft',({side})=>{
  cancelAnimationFrame(animId); clearInterval(sendTimer);
  alert(`Игрок «${NAME[side]}» отключился. Игра завершена.`);
  location.reload();
});

socket.on('err',msg=>{document.getElementById('lobby-err').textContent=msg;});

// ─── Lobby actions ───────────────────────────────────────────────
function createRoom(){socket.emit('create',{mode:myMode});}
function joinRoom(){
  const c=document.getElementById('code-in').value.trim();
  if(c.length!==4){document.getElementById('lobby-err').textContent='Введи 4-символьный код';return;}
  socket.emit('join',{roomId:c});
}

// ─── Game init ───────────────────────────────────────────────────
function initGame(){
  canvas=document.getElementById('c');
  ctx=canvas.getContext('2d');
  resize(); window.addEventListener('resize',resize);

  canvas.addEventListener('mousemove',e=>{
    const r=canvas.getBoundingClientRect();
    mouseX=(e.clientX-r.left)/scale; mouseY=(e.clientY-r.top)/scale;
  });
  canvas.addEventListener('touchmove',e=>{
    e.preventDefault();
    const r=canvas.getBoundingClientRect();
    const t=e.touches[0];
    mouseX=(t.clientX-r.left)/scale; mouseY=(t.clientY-r.top)/scale;
  },{passive:false});
  canvas.addEventListener('touchstart',e=>{
    const r=canvas.getBoundingClientRect();
    const t=e.touches[0];
    mouseX=(t.clientX-r.left)/scale; mouseY=(t.clientY-r.top)/scale;
  });

  window.addEventListener('keydown',e=>{
    keys[e.key]=true;
    if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();
  });
  window.addEventListener('keyup',e=>{keys[e.key]=false;});

  document.getElementById('ctrl-hint').textContent=`Вы — ${NAME[mySide]}  |  ${CTRL[mySide]}`;
  document.getElementById('gw').classList.add('on');
  show('gw');

  sendTimer=setInterval(sendPos,1000/60);
  animId=requestAnimationFrame(loop);
}

function resize(){
  const sz=Math.min(window.innerWidth-16,window.innerHeight-60,720);
  canvas.width=canvas.height=sz;
  scale=sz/GW;
}

// ─── Paddle control ──────────────────────────────────────────────
function myPaddlePos(){
  const isV=mySide==='left'||mySide==='right';
  const cur=gs?.paddles?.[mySide]?.pos??((isV?GH:GW)/2-PAD_LEN/2);
  const sc =gs?.scores?.[mySide]||0;
  const spd=(BASE_SPD+Math.min(sc*SPD_PER_SCORE,MAX_EXTRA))/60;
  let pos=cur, keyUsed=false;

  if(isV){
    if(mySide==='left'){
      if(keys['w']||keys['W']){pos=cur-spd;keyUsed=true;}
      if(keys['s']||keys['S']){pos=cur+spd;keyUsed=true;}
    }else{
      if(keys['ArrowUp'])  {pos=cur-spd;keyUsed=true;}
      if(keys['ArrowDown']){pos=cur+spd;keyUsed=true;}
    }
    if(!keyUsed) pos=mouseY-PAD_LEN/2;
  }else{
    if(mySide==='top'){
      if(keys['a']||keys['A']){pos=cur-spd;keyUsed=true;}
      if(keys['d']||keys['D']){pos=cur+spd;keyUsed=true;}
    }else{
      if(keys['ArrowLeft']) {pos=cur-spd;keyUsed=true;}
      if(keys['ArrowRight']){pos=cur+spd;keyUsed=true;}
    }
    if(!keyUsed) pos=mouseX-PAD_LEN/2;
  }
  const lim=(isV?GH:GW)-WALL-PAD_W-PAD_LEN;
  return Math.max(WALL+PAD_W,Math.min(lim,pos));
}

let lastPos=null;
function sendPos(){
  if(!gs) return;
  const p=myPaddlePos();
  if(p!==lastPos){socket.emit('move',{pos:p});lastPos=p;}
}

// ─── Draw ────────────────────────────────────────────────────────
function loop(){animId=requestAnimationFrame(loop);draw();}

function draw(){
  if(!ctx)return;
  const S=canvas.width;
  ctx.clearRect(0,0,S,S);

  // Background
  ctx.fillStyle='#0f0f1a';
  rr(0,0,S,S,12); ctx.fill();

  // Grid
  ctx.strokeStyle='rgba(127,119,221,.055)';ctx.lineWidth=.5;
  for(let i=1;i<10;i++){
    const v=S/10*i;
    ctx.beginPath();ctx.moveTo(v,0);ctx.lineTo(v,S);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,v);ctx.lineTo(S,v);ctx.stroke();
  }

  // Dashed center lines
  ctx.strokeStyle='rgba(127,119,221,.1)';ctx.lineWidth=.8;ctx.setLineDash([5,9]);
  ctx.beginPath();ctx.moveTo(S/2,WALL*scale);ctx.lineTo(S/2,S-WALL*scale);ctx.stroke();
  ctx.beginPath();ctx.moveTo(WALL*scale,S/2);ctx.lineTo(S-WALL*scale,S/2);ctx.stroke();
  ctx.setLineDash([]);

  if(!gs){
    ctx.fillStyle='rgba(255,255,255,.3)';ctx.font=`${14*scale}px system-ui`;
    ctx.textAlign='center';ctx.fillText('Ожидание игроков…',S/2,S/2);
    return;
  }

  const{ball,paddles,stars,lasers,scores,lives}=gs;
  const all=myMode===2?['left','right']:['left','right','top','bottom'];

  // Walls
  all.forEach(s=>{
    const alive=paddles[s]?.alive;
    ctx.fillStyle=alive?'rgba(255,255,255,.055)':'rgba(220,70,70,.18)';
    const w=WALL*scale;
    if(s==='left')  ctx.fillRect(0,0,w,S);
    if(s==='right') ctx.fillRect(S-w,0,w,S);
    if(s==='top')   ctx.fillRect(0,0,S,w);
    if(s==='bottom')ctx.fillRect(0,S-w,S,w);
  });

  // Lasers (behind paddles, in front of wall)
  all.forEach(s=>{
    if(!lasers?.[s])return;
    const pad=paddles[s];if(!pad?.alive)return;
    const lOff=(WALL+PAD_W+18)*scale;
    const p1=pad.pos*scale, p2=(pad.pos+PAD_LEN)*scale;
    ctx.strokeStyle='#FF3344';ctx.lineWidth=2.5*scale;
    ctx.shadowColor='#FF3344';ctx.shadowBlur=14*scale;
    ctx.beginPath();
    if(s==='left')  {ctx.moveTo(lOff,p1);ctx.lineTo(lOff,p2);}
    if(s==='right') {ctx.moveTo(S-lOff,p1);ctx.lineTo(S-lOff,p2);}
    if(s==='top')   {ctx.moveTo(p1,lOff);ctx.lineTo(p2,lOff);}
    if(s==='bottom'){ctx.moveTo(p1,S-lOff);ctx.lineTo(p2,S-lOff);}
    ctx.stroke();
    ctx.shadowBlur=0;

    // Label
    ctx.fillStyle='rgba(255,51,68,.7)';ctx.font=`bold ${8*scale}px system-ui`;
    ctx.textAlign='center';
    const mx=(p1+p2)/2;
    if(s==='left')  ctx.fillText('⚡ЛАЗЕР',lOff+20*scale,mx);
    if(s==='right') ctx.fillText('⚡ЛАЗЕР',S-lOff-20*scale,mx);
    if(s==='top')   ctx.fillText('⚡ЛАЗЕР',mx,lOff+16*scale);
    if(s==='bottom')ctx.fillText('⚡ЛАЗЕР',mx,S-lOff-10*scale);
  });

  // Paddles
  all.forEach(s=>{
    const pad=paddles[s];if(!pad?.alive)return;
    const col=COL[s];
    const pw=PAD_W*scale,pl=PAD_LEN*scale,wOf=WALL*scale;
    let rx,ry,rw,rh;
    if(s==='left')  {rx=wOf;        ry=pad.pos*scale;rw=pw;rh=pl;}
    if(s==='right') {rx=S-wOf-pw;   ry=pad.pos*scale;rw=pw;rh=pl;}
    if(s==='top')   {rx=pad.pos*scale;ry=wOf;       rw=pl;rh=pw;}
    if(s==='bottom'){rx=pad.pos*scale;ry=S-wOf-pw;  rw=pl;rh=pw;}
    if(s===mySide){ctx.shadowColor=col;ctx.shadowBlur=16*scale;}
    ctx.fillStyle=col;
    rr(rx,ry,rw,rh,3*scale);ctx.fill();
    ctx.shadowBlur=0;

    // Score & lives display next to wall
    const wc=WALL*scale/2;
    ctx.fillStyle=col;ctx.textAlign='center';
    const sc=scores[s]||0, lv=lives[s]||0;
    const lstr='♥'.repeat(Math.max(0,lv));
    ctx.font=`bold ${10*scale}px system-ui`;
    if(s==='left')  {ctx.fillText(sc,wc,S/2-7*scale);ctx.font=`${8*scale}px system-ui`;ctx.fillText(lstr,wc,S/2+7*scale);}
    if(s==='right') {ctx.fillText(sc,S-wc,S/2-7*scale);ctx.font=`${8*scale}px system-ui`;ctx.fillText(lstr,S-wc,S/2+7*scale);}
    if(s==='top')   {ctx.fillText(sc,S/2,wc+1*scale);ctx.font=`${8*scale}px system-ui`;ctx.fillText(lstr,S/2,wc+12*scale);}
    if(s==='bottom'){ctx.fillText(sc,S/2,S-wc-4*scale);ctx.font=`${8*scale}px system-ui`;ctx.fillText(lstr,S/2,S-2*scale);}
  });

  // Stars
  (stars||[]).forEach(st=>{
    const sx=st.x*scale,sy=st.y*scale,sr=STAR_R*scale;
    ctx.fillStyle='#FFD700';ctx.shadowColor='#FFAA00';ctx.shadowBlur=12*scale;
    star5(ctx,sx,sy,sr,sr*.42);
    ctx.shadowBlur=0;
  });

  // Ball trail
  if(ball){
    trail.push({x:ball.x,y:ball.y,t:Date.now()});
    trail=trail.filter(p=>Date.now()-p.t<120);
    trail.forEach((p,i)=>{
      const a=(i/trail.length)*.2;
      ctx.beginPath();ctx.arc(p.x*scale,p.y*scale,BALL_R*scale*(i/trail.length),0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.fill();
    });
  }

  // Ball
  if(ball){
    const bx=ball.x*scale,by=ball.y*scale,br=BALL_R*scale;
    if(ball.frozen){
      const pulse=1+.18*Math.sin(Date.now()/140);
      ctx.fillStyle='#88CCFF';ctx.shadowColor='#66AAFF';ctx.shadowBlur=22*scale;
      ctx.beginPath();ctx.arc(bx,by,br*pulse,0,Math.PI*2);ctx.fill();

      // Countdown ring
      const prog=ball.freezeTimer!==undefined?ball.freezeTimer/2:1;
      ctx.strokeStyle='rgba(136,204,255,.5)';ctx.lineWidth=2*scale;
      ctx.beginPath();ctx.arc(bx,by,br*2,-(Math.PI/2),-(Math.PI/2)+prog*2*Math.PI);ctx.stroke();
    }else{
      ctx.fillStyle='#ffffff';ctx.shadowColor='#ffffff';ctx.shadowBlur=16*scale;
      ctx.beginPath();ctx.arc(bx,by,br,0,Math.PI*2);ctx.fill();
    }
    ctx.shadowBlur=0;
  }
}

// ─── Helpers ────────────────────────────────────────────────────
function rr(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.rect(x,y,w,h);}
}

function star5(ctx,cx,cy,outerR,innerR){
  let rot=-Math.PI/2,step=Math.PI/5;
  ctx.beginPath();ctx.moveTo(cx,cy-outerR);
  for(let i=0;i<5;i++){
    ctx.lineTo(cx+Math.cos(rot)*outerR,cy+Math.sin(rot)*outerR);rot+=step;
    ctx.lineTo(cx+Math.cos(rot)*innerR,cy+Math.sin(rot)*innerR);rot+=step;
  }
  ctx.closePath();ctx.fill();
}
</script>
</body>
</html>
